<!DOCTYPE html>
  </table>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxtvqp3h_tDAIpf3FtljWUB663_7JJTaYo77hYxbVm6GVpYgtxd5ScihbhD91hCuWMXg/exec";

async function saveData() {

  const date = document.getElementById("date").value;
  const description = document.getElementById("description").value;
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;

  if (!date || !description || !amount) {
    alert("Please fill all fields");
    return;
  }

  const data = {
    date,
    description,
    amount,
    type
  };

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  document.getElementById("description").value = "";
  document.getElementById("amount").value = "";

  loadData();
}

async function loadData() {

  const response = await fetch(SCRIPT_URL);
  const records = await response.json();

  const tableBody = document.getElementById("tableBody");
  tableBody.innerHTML = "";

  let latestTotal = 0;

  records.forEach(record => {

    latestTotal = record.totalSavings;

    const row = `
      <tr>
        <td>${record.date}</td>
        <td>${record.description}</td>
        <td>₱${record.amount}</td>
        <td class="${record.type === 'Deposit' ? 'deposit' : 'withdraw'}">
          ${record.type}
        </td>
        <td>₱${record.totalSavings}</td>
      </tr>
    `;

    tableBody.innerHTML += row;
  });

  document.getElementById("totalSavings").innerText = latestTotal;
}

loadData();

</script>

</body>
</html>
